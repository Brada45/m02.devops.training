version: v1.0
name: "\U0001F31F Fan-In/Fan-Out Pipeline"
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode16
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
blocks: []
